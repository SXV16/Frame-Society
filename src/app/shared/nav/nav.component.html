<!-- Navigation -->
  <nav class="fixed top-0 w-full z-50 bg-[var(--deep-purple)]/90 backdrop-blur-md border-b border-[var(--gold)]/30">
    <div class="container mx-auto px-6 py-4 flex justify-between items-center">

      <!-- Logo -->
      <a routerLink="/" class="flex items-center gap-3 cursor-pointer">
        <div class="w-10 h-10 rounded-full border border-[var(--gold)] flex items-center justify-center bg-black/50">
          <span class="material-symbols-outlined text-[var(--gold)]">movie_filter</span>
        </div>
        <span class="heading-font text-2xl tracking-widest text-white">
          RAPHAEL <span class="text-[var(--gold)]">FRAME</span> SOCIETY
        </span>
      </a>

      <!-- Navigation Links -->
      <div class="hidden md:flex space-x-10">
        <a
          routerLink=""
          class="nav-link text-white hover:text-[var(--gold)] uppercase text-sm tracking-widest font-medium transition-colors">
          Home
        </a>
        <a
          routerLink="/store"
          class="nav-link text-white hover:text-[var(--gold)] uppercase text-sm tracking-widest font-medium transition-colors">
          Store
        </a>
        <a
          routerLink="/adult"
          class="nav-link text-red-500 hover:text-red-400 uppercase text-sm tracking-widest font-medium transition-colors flex items-center gap-1">
          Adult <span class="text-[10px] border border-red-500 px-1 rounded">18+</span>
        </a>
        <a
          routerLink="/suggestion"
          class="nav-link text-white hover:text-[var(--gold)] uppercase text-sm tracking-widest font-medium transition-colors">
          Suggestion
        </a>
      </div>

      <!-- Actions -->
      <div class="flex items-center space-x-4 md:space-x-6">
        <ng-container *ngIf="!user">
          <a routerLink="/login" class="text-white hover:text-[var(--gold)] uppercase text-sm font-medium transition-colors">Login</a>
          <a routerLink="/register" class="text-white hover:text-[var(--gold)] uppercase text-sm font-medium transition-colors">Register</a>
        </ng-container>
        <ng-container *ngIf="user">
          <span class="text-white/90 text-sm truncate max-w-[120px]">{{ user.email }}</span>
          <a *ngIf="user.role === 'admin'" routerLink="/admin/products" class="text-[var(--gold)] hover:underline text-sm">Admin</a>
          <button type="button" (click)="logout()" class="text-white/80 hover:text-white text-sm">Logout</button>
        </ng-container>
        <a routerLink="/cart" class="text-white hover:text-[var(--gold)] transition-colors relative cursor-pointer">
          <span class="material-symbols-outlined">shopping_bag</span>
          <span *ngIf="cartCount > 0" class="absolute -top-1 -right-1 bg-[var(--gold)] text-[var(--deep-purple)] text-[10px] font-bold min-w-[18px] h-[18px] rounded-full flex items-center justify-center px-1">
            {{ cartCount }}
          </span>
        </a>
      </div>

    </div>
  </nav>
