<div class="page cinematic-bg">
  <app-nav></app-nav>
  <div class="page-main page-main-wide mx-auto">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a routerLink="/" class="breadcrumb__link">Home</a>
      <span class="breadcrumb__sep" aria-hidden="true">/</span>
      <a routerLink="/store" class="breadcrumb__link">Store</a>
      <span class="breadcrumb__sep" aria-hidden="true">/</span>
      <span class="breadcrumb__current" *ngIf="product">{{ product.title }}</span>
    </nav>
    <p *ngIf="loading" class="text-white">Loading…</p>
    <p *ngIf="!loading && !product" class="text-white">Product not found.</p>

    <div *ngIf="product && !loading" class="grid grid-cols-1 lg:grid-cols-12 gap-12 xl:gap-20 pt-4">
      <div class="lg:col-span-7">
        <div class="relative w-full aspect-[4/3] rounded-xl overflow-hidden shadow-2xl border border-white/5 bg-black">
          <img [src]="productImage()" [alt]="product.title" class="w-full h-full object-cover" />
        </div>
      </div>

      <div class="lg:col-span-5 flex flex-col">
        <div class="sticky top-24 space-y-8">
          <div class="space-y-2 border-b border-white/10 pb-6">
            <h1 class="font-orbitron text-4xl lg:text-5xl font-bold leading-tight text-white tracking-wide">
              {{ product.title }}
            </h1>
            <div class="flex items-center justify-between pt-2">
              <h2 class="text-3xl font-bold text-[var(--gold)] font-display">
                ${{ product.price | number:'1.2-2' }}
                <span class="text-sm font-normal text-gray-400 align-top mt-1 inline-block">USD</span>
              </h2>
            </div>
          </div>

          <div class="space-y-6" *ngIf="parseSizes(product.sizes).length">
            <span class="text-sm font-bold uppercase tracking-wider text-gray-400">Select Size</span>
            <div class="grid grid-cols-3 gap-3">
              <label *ngFor="let s of parseSizes(product.sizes)" class="cursor-pointer">
                <input type="radio" [value]="s" [(ngModel)]="selectedSize" class="peer sr-only" name="size" />
                <div class="h-14 text-white rounded-lg bg-white/5 border border-white/10 flex items-center justify-center text-center peer-checked:border-[var(--gold)] peer-checked:bg-[var(--gold)]/10 peer-checked:text-[var(--gold)] transition-all hover:bg-white/10">
                  <span class="font-bold text-sm">{{ s }}</span>
                </div>
              </label>
            </div>
          </div>

          <div class="py-4 border-t border-white/10">
            <h3 class="font-orbitron text-lg text-white mb-2 font-semibold">Description</h3>
            <p class="font-montserrat text-gray-300 text-sm leading-relaxed">{{ product.description || 'No description.' }}</p>
          </div>

          <div class="pt-2 flex gap-4">
            <div class="flex items-center bg-white/5 rounded-lg border border-white/10">
              <button type="button" (click)="decrementQty()" class="w-12 h-12 flex items-center justify-center text-white hover:text-[var(--gold)] transition-colors">
                <span class="material-symbols-outlined">remove</span>
              </button>
              <input type="number" [(ngModel)]="quantity" min="1" class="w-14 bg-transparent border-none text-center text-white font-bold focus:ring-0 outline-none" />
              <button type="button" (click)="quantity = quantity + 1" class="w-12 h-12 flex items-center justify-center text-white hover:text-[var(--gold)] transition-colors">
                <span class="material-symbols-outlined">add</span>
              </button>
            </div>
            <button type="button" (click)="addToCart()" class="btn-primary flex-1 h-12 flex items-center justify-center gap-2">
              <span class="material-symbols-outlined">shopping_cart</span>
              {{ addSuccess ? 'Added!' : 'Add to Cart' }}
            </button>
          </div>

          <div class="flex items-center justify-center gap-6 text-xs text-gray-500">
            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">local_shipping</span> Free Shipping</span>
            <span class="flex items-center gap-1"><span class="material-symbols-outlined text-[14px]">verified</span> Authenticity Guaranteed</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
